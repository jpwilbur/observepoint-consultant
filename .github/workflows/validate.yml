name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run structural validation
        run: python3 scripts/quick_validate.py
      - name: Validate evals structure
        run: python3 scripts/run_evals.py
