name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run structural validation
        run: python3 scripts/quick_validate.py
      - name: Validate evals structure
        run: python3 scripts/run_evals.py

      - name: Install test deps
        run: pip install pytest
      - name: Release-tooling tests
        run: python3 -m pytest scripts/test_publish_to_drive.py scripts/test_check_plugin_meta.py -q
      - name: Plugin metadata (Cowork upload rules)
        run: python3 scripts/check_plugin_meta.py .

      - name: Build artifact (smoke test, no publish)
        run: bash scripts/build_plugin.sh /tmp/out.plugin
      - name: Bundle is a plugin, not a marketplace
        run: |
          unzip -l /tmp/out.plugin | grep -qE '\.claude-plugin/plugin\.json'
          if unzip -l /tmp/out.plugin | grep -q 'marketplace.json'; then
            echo "ERROR: marketplace.json leaked into the bundle" >&2; exit 1
          fi
